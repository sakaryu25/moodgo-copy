               C 214 350 228 356 243 354 C 255 352 264 344 268 334
               C 275 320 272 302 260 292 C 256 288 252 286 248 284 Z"/>
    </g>

    <!-- 近畿 (ピンク/パープル) -->
    <g fill="#E899C8">
      <path d="M 195 305 C 180 308 168 320 166 336 C 164 350 172 363 184 370
               C 196 376 212 374 221 364 C 230 354 230 338 222 328
               C 214 318 205 310 195 305 Z"/>
    </g>

    <!-- 中国 (イエロー) -->
    <g fill="#E8C840">
      <path d="M 155 340 C 138 335 120 340 112 354 C 104 368 108 385 120 394
               C 132 402 150 402 163 394 C 176 386 182 370 176 356
               C 172 348 164 342 155 340 Z"/>
    </g>

    <!-- 四国 (ティール) -->
    <g fill="#40B8A8">
      <path d="M 170 385 C 158 382 146 388 140 400 C 134 412 138 427 150 434
               C 162 440 178 438 186 427 C 194 416 192 400 182 393
               C 178 390 174 387 170 385 Z"/>
    </g>

    <!-- 九州 (コーラルピンク) -->
    <g fill="#E88888">
      <path d="M 120 385 C 105 378 88 382 78 395 C 68 408 70 428 82 440
               C 92 450 108 455 124 450 C 140 444 150 430 146 415
               C 142 400 132 388 120 385 Z"/>
      <!-- 対馬 -->
      <ellipse cx="76" cy="368" rx="7" ry="12" opacity="0.8"/>
    </g>

    <!-- 沖縄 (ライトコーラル) -->
    <g fill="#E87878" opacity="0.85">
      <ellipse cx="65" cy="490" rx="10" ry="6" transform="rotate(-20, 65, 490)"/>
      <ellipse cx="52" cy="510" rx="8" ry="5" transform="rotate(-20, 52, 510)"/>
      <ellipse cx="42" cy="528" rx="7" ry="4" transform="rotate(-20, 42, 528)"/>
      <ellipse cx="34" cy="545" rx="5" ry="3.5" transform="rotate(-20, 34, 545)"/>
