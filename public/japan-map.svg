<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800" width="500" height="800">
  <defs>
    <filter id="dropshadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>
  
  <g transform="rotate(-28, 250, 400)" filter="url(#softshadow)">
    
    <!-- 北海道 (ライトブルー) -->
    <g fill="#93C5E8">
      <path d="M 310 60 C 295 45 270 48 258 62 C 248 74 252 90 265 98 C 255 105 248 118 255 130 
               C 262 142 278 145 290 140 C 302 148 318 150 330 142 C 345 132 348 115 340 103 
               C 355 95 365 80 358 68 C 350 55 330 55 310 60 Z"/>
      <!-- 知床半島 -->
      <ellipse cx="355" cy="58" rx="18" ry="8" transform="rotate(-20, 355, 58)" opacity="0.9"/>
    </g>

    <!-- 東北 (ブルー) -->
    <g fill="#5A9BC8">
      <path d="M 268 140 C 258 148 250 165 252 182 C 254 196 260 210 268 222 
               C 272 232 276 244 274 256 C 272 264 266 270 262 278
               C 272 282 285 280 292 274 C 300 265 302 250 298 238
               C 308 228 314 212 310 196 C 306 180 296 168 290 158
               C 284 148 278 142 268 140 Z"/>
